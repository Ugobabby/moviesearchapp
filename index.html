<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieFlix Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVIGATION BAR -->
  <header class="navbar">
    <h2>MovieFlix</h2>
  </header>

  <!-- Main container -->
  <div class="container">
    <h1>Find Your Favourite Movie</h1>

    <!-- Search input and button -->
    <div class="search-box">
      <input type="text" id="movie-input" placeholder="Search for a movie">
      <button id="btn">Search</button>
    </div>

    <!-- Movie rows container -->
    <div id="movie-rows"></div>
  </div>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
